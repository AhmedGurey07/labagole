<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golaha Laba Gole - Registry Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&display=swap');
        :root { --gool-gold: #fbbf24; --gold-gradient: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        body { background-color: #070707; background-image: radial-gradient(circle at 50% 0%, #112b1d 0%, #070707 70%); font-family: 'Inter', sans-serif; color: #f1f5f9; min-height: 100vh; padding: 20px; }
        
        /* Award Styling */
        .award-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 32px; padding: 24px; position: relative; overflow: hidden; backdrop-filter: blur(10px); }
        .award-box { height: 260px; width: 100%; border-radius: 20px; background: #000; border: 2px solid rgba(251, 191, 36, 0.1); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .award-img { width: 100%; height: 100%; object-fit: cover; }
        .rank-one-tag { position: absolute; top: 12px; right: 12px; background: var(--gold-gradient); color: black; padding: 4px 12px; border-radius: 99px; font-weight: 900; font-size: 10px; z-index: 10; }
        .name-display { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin-top: 15px; font-family: 'Oswald'; }
        
        /* Panel Styling */
        .glass-panel { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .tab-btn { padding: 8px 16px; border-radius: 12px; font-weight: 700; background: rgba(255,255,255,0.03); color: #94a3b8; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .tab-active { background: var(--gool-gold) !important; color: #000 !important; }
        
        table { border-spacing: 0 8px; border-collapse: separate; width: 100%; }
        tbody tr { background: white; border-radius: 12px; transition: transform 0.2s; }
        tbody td { color: #064e3b; font-weight: 800; padding: 14px; text-align: center; }
        
        .admin-only { display: none; }
        .oswald { font-family: 'Oswald', sans-serif; }
        select option { background: #111; color: white; }
    </style>
</head>
<body>

<div class="max-w-[1400px] mx-auto">
    <header class="mb-12 flex flex-col lg:flex-row justify-between items-center gap-8">
        <h1 class="text-6xl font-black oswald text-white tracking-tighter" onclick="secretLogin()">GOLAHA <span class="text-yellow-500">LABA GOLE</span></h1>
        
        <div class="glass-panel p-2 flex flex-wrap gap-2 justify-center shadow-2xl">
            <select id="viewYear" onchange="render()" class="tab-btn bg-transparent border-none font-bold text-yellow-500"></select>
            <button onclick="changeFilter('YEAR')" id="f-YEAR" class="tab-btn tab-active">🏆 SEASON</button>
            <select id="selMonth" onchange="changeFilter('MONTH')" class="tab-btn bg-transparent border-none">
                <option value="">-- MONTH --</option>
                <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                <option value="9">October</option><option value="10">November</option><option value="11">December</option>
            </select>
            <select id="selWeek" onchange="changeFilter('WEEK')" class="tab-btn bg-transparent border-none">
                <option value="">-- WEEK --</option>
                <option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option>
            </select>
        </div>
    </header>

    <!-- Award Highlights -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
        <div class="award-card"><div class="award-box" id="box-WEEK"><span>🏆</span></div><div class="rank-one-tag">WEEKLY MVP</div><div id="name-WEEK" class="name-display text-center">---</div></div>
        <div class="award-card border-yellow-500"><div class="award-box" id="box-MONTH"><span>⚽</span></div><div class="rank-one-tag">MONTHLY KING</div><div id="name-MONTH" class="name-display text-center">---</div></div>
        <div class="award-card"><div class="award-box" id="box-YEAR"><span>🎖️</span></div><div class="rank-one-tag">SEASON LEGEND</div><div id="name-YEAR" class="name-display text-center">---</div></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <!-- Input Center (Admin Only) -->
        <aside id="adminPanel" class="lg:col-span-3 admin-only">
            <div id="formCard" class="glass-panel p-6 sticky top-6 border-white/5 shadow-2xl">
                
                <!-- Admin Tabs -->
                <div class="flex gap-2 mb-6 border-b border-white/10 pb-4">
                    <button onclick="switchAdminTab('data')" id="tabData" class="text-[10px] font-bold uppercase text-yellow-500">Enter Stats</button>
                    <span class="text-gray-700">|</span>
                    <button onclick="switchAdminTab('reg')" id="tabReg" class="text-[10px] font-bold uppercase text-gray-500">Register Player</button>
                </div>

                <!-- Registration Form -->
                <div id="regForm" class="hidden space-y-4">
                    <h3 class="oswald text-sm text-yellow-500">NEW PLAYER REGISTRY</h3>
                    <input type="text" id="regName" placeholder="PLAYER FULL NAME" class="w-full p-4 rounded-xl bg-black/40 border border-white/10 uppercase font-bold text-white outline-none">
                    <div class="p-3 rounded-xl bg-white/5 border border-white/10">
                        <label class="text-[10px] text-gray-400 block mb-1">UPLOAD PHOTO</label>
                        <input type="file" id="regPhoto" class="text-[10px] w-full" accept="image/*">
                    </div>
                    <button onclick="registerPlayer()" class="w-full py-3 rounded-xl bg-blue-600 text-white font-bold uppercase text-xs">Save to Registry</button>
                </div>

                <!-- Stats Form -->
                <div id="statsForm" class="space-y-4">
                    <h3 class="oswald text-sm text-yellow-500">UPLOAD WEEKLY STATS</h3>
                    <select id="pNameSelect" class="w-full p-4 rounded-xl bg-black/40 border border-white/10 font-bold text-white outline-none">
                        <option value="">-- SELECT PLAYER --</option>
                    </select>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <select id="inMonth" class="p-3 rounded-xl bg-black/40 text-xs text-white"></select>
                        <select id="inWeek" class="p-3 rounded-xl bg-black/40 text-xs text-white">
                            <option value="1">Week 1</option><option value="2">Week 2</option><option value="3">Week 3</option><option value="4">Week 4</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" id="s1" placeholder="T2" class="p-3 rounded-xl bg-black/40 text-center text-xs">
                        <input type="number" id="s2" placeholder="B3" class="p-3 rounded-xl bg-black/40 text-center text-xs">
                        <input type="number" id="s3" placeholder="S4" class="p-3 rounded-xl bg-black/40 text-center text-xs">
                        <input type="number" id="s4" placeholder="P5" class="p-3 rounded-xl bg-black/40 text-center text-xs">
                        <input type="number" id="s5" placeholder="T7" class="p-3 rounded-xl bg-black/40 text-center text-xs">
                        <input type="number" id="s6" placeholder="R9" class="p-3 rounded-xl bg-black/40 text-center text-xs">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="gA" placeholder="Goals" class="p-3 rounded-xl bg-red-500/10 text-red-500 font-bold text-center">
                        <input type="number" id="aA" placeholder="Assists" class="p-3 rounded-xl bg-green-500/10 text-green-500 font-bold text-center">
                    </div>

                    <button onclick="saveStats()" id="btnSave" class="w-full py-4 rounded-xl bg-yellow-500 text-black font-black oswald uppercase tracking-wider">Save Record</button>
                    <button onclick="cancelEdit()" id="btnCancel" class="hidden w-full text-red-500 text-[10px] font-bold mt-2">CANCEL</button>
                </div>

                <button onclick="logout()" class="w-full text-[10px] text-gray-600 mt-6 uppercase tracking-widest">Logout</button>
            </div>
        </aside>

        <!-- Table Display Area -->
        <div id="mainTableArea" class="lg:col-span-12">
            <div class="glass-panel overflow-hidden border-white/5 shadow-2xl">
                <div class="p-1 overflow-x-auto">
                    <table class="w-full">
                        <thead class="oswald text-[10px] tracking-widest text-gray-500 uppercase">
                            <tr><th class="p-4">Rank</th><th class="p-4 text-left">Athlete</th><th>T2</th><th>B3</th><th>S4</th><th>P5</th><th>T7</th><th>R9</th><th class="text-red-500">G</th><th class="text-green-500">A</th><th class="text-black">Total</th><th class="admin-only">Action</th></tr>
                        </thead>
                        <tbody id="pBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBf2qZ1CcKt7QHnNi55H9JxBxliW7isXiE",
      authDomain: "labagole-36eef.firebaseapp.com",
      databaseURL: "https://labagole-36eef-default-rtdb.firebaseio.com",
      projectId: "labagole-36eef",
      storageBucket: "labagole-36eef.firebasestorage.app",
      messagingSenderId: "747283642005",
      appId: "1:747283642005:web:c5843eb1ae73e52a980d9c"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('golaha_data');
    const profilesRef = firebase.database().ref('golaha_profiles');

    let isAdmin = new URLSearchParams(window.location.search).get('view') === 'admin';
    if(isAdmin) {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        document.getElementById('mainTableArea').classList.replace('lg:col-span-12', 'lg:col-span-9');
    }

    function secretLogin() { let pw = prompt("Admin Code:"); if(pw === "123") window.location.search = "?view=admin"; }
    function logout() { window.location.search = ""; }

    let db = {}, profiles = {}, activeFilter = 'YEAR';
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    dbRef.on('value', s => { db = s.val() || {}; render(); });
    profilesRef.on('value', s => { 
        profiles = s.val() || {}; 
        updateNameDropdown(); 
        render(); 
    });

    function setup() {
        const yrSel = document.getElementById('viewYear');
        for (let y = 2026; y <= 2030; y++) { let o = document.createElement('option'); o.value = y; o.innerHTML = y; yrSel.appendChild(o); }
        const mIn = document.getElementById('inMonth');
        MONTHS.forEach((m, i) => mIn.innerHTML += `<option value="${i}">${m}</option>`);
    }
    setup();

    function updateNameDropdown() {
        const sel = document.getElementById('pNameSelect');
        const currentVal = sel.value;
        sel.innerHTML = '<option value="">-- SELECT PLAYER --</option>';
        Object.keys(profiles).sort().forEach(name => {
            sel.innerHTML += `<option value="${name}">${name}</option>`;
        });
        sel.value = currentVal;
    }

    function switchAdminTab(tab) {
        document.getElementById('regForm').classList.toggle('hidden', tab !== 'reg');
        document.getElementById('statsForm').classList.toggle('hidden', tab !== 'data');
        document.getElementById('tabReg').classList.toggle('text-yellow-500', tab === 'reg');
        document.getElementById('tabReg').classList.toggle('text-gray-500', tab !== 'reg');
        document.getElementById('tabData').classList.toggle('text-yellow-500', tab === 'data');
        document.getElementById('tabData').classList.toggle('text-gray-500', tab !== 'data');
    }

    function registerPlayer() {
        const name = document.getElementById('regName').value.toUpperCase().trim();
        const file = document.getElementById('regPhoto').files[0];
        if(!name || !file) return alert("Enter Name and Select Photo!");

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            profilesRef.child(name).set(reader.result).then(() => {
                alert(name + " Registered!");
                document.getElementById('regName').value = "";
                document.getElementById('regPhoto').value = "";
                switchAdminTab('data');
            });
        };
    }

    function render() {
        const body = document.getElementById('pBody'); body.innerHTML = '';
        const yr = document.getElementById('viewYear').value;
        const vM = document.getElementById('selMonth').value;
        const vW = document.getElementById('selWeek').value;

        let scores = { WEEK: [], MONTH: [], YEAR: [], LIST: [] };

        for(let name in db[yr]) {
            let pW = { name, t:0, count:0 }, pM = { name, t:0, count:0 }, pY = { name, t:0, count:0 }, listP = { name, s:[0,0,0,0,0,0], gV:0, aV:0, t:0, count:0 };
            for(let m in db[yr][name]) {
                for(let w in db[yr][name][m]) {
                    let d = db[yr][name][m][w];
                    pY.t += d.total; pY.count++;
                    if(m === vM) { pM.t += d.total; pM.count++; }
                    if(m === vM && w === vW) { pW.t += d.total; pW.count++; }
                    if(activeFilter === 'YEAR' || (activeFilter === 'MONTH' && m === vM) || (activeFilter === 'WEEK' && m === vM && w === vW)) {
                        d.sc.forEach((v,i) => listP.s[i] += parseInt(v));
                        listP.gV += d.gV; listP.aV += d.aV; listP.t += d.total; listP.count++;
                    }
                }
            }
            if(pW.count > 0) scores.WEEK.push(pW);
            if(pM.count > 0) scores.MONTH.push(pM);
            if(pY.count > 0) scores.YEAR.push(pY);
            if(listP.count > 0) scores.LIST.push(listP);
        }

        const getTop = (arr) => arr.sort((a,b) => b.t - a.t)[0]?.name || "---";
        updateAwardBox('WEEK', getTop(scores.WEEK));
        updateAwardBox('MONTH', getTop(scores.MONTH));
        updateAwardBox('YEAR', getTop(scores.YEAR));

        scores.LIST.sort((a,b) => b.t - a.t).forEach((p, i) => {
            const r = document.createElement('tr');
            r.innerHTML = `<td>#${i+1}</td><td class="text-left oswald uppercase text-lg">${p.name}</td>${p.s.map(v => `<td class="text-xs text-gray-400">${v}</td>`).join('')}<td class="text-red-600">${p.gV}</td><td class="text-green-600">${p.aV}</td><td class="bg-yellow-500/10 font-black text-2xl">${p.t}</td>${isAdmin ? `<td><button onclick="editEntry('${p.name}')" class="text-blue-500">✎</button></td>` : ''}`;
            body.appendChild(r);
        });
    }

    function updateAwardBox(type, name) {
        document.getElementById(`name-${type}`).innerText = name;
        const box = document.getElementById(`box-${type}`);
        box.innerHTML = profiles[name] ? `<img src="${profiles[name]}" class="award-img">` : `<span class="text-4xl opacity-20">👤</span>`;
    }

    function saveStats() {
        const yr = document.getElementById('viewYear').value;
        const name = document.getElementById('pNameSelect').value;
        const m = document.getElementById('inMonth').value;
        const w = document.getElementById('inWeek').value;
        if(!name || m==="" || w==="") return alert("Missing Selections!");

        const sc = [1,2,3,4,5,6].map(i => parseInt(document.getElementById('s'+i).value || 0));
        const gV = parseInt(document.getElementById('gA').value || 0);
        const aV = parseInt(document.getElementById('aA').value || 0);
        const total = sc.reduce((a, b) => a + b, 0) + (gV > 0 ? 6 : 0) + (aV > 0 ? 4 : 0);

        firebase.database().ref(`golaha_data/${yr}/${name}/${m}/${w}`).set({ sc, gV, aV, total }).then(() => {
            alert("Stats Saved!");
            cancelEdit();
        });
    }

    function editEntry(name) {
        const yr = document.getElementById('viewYear').value;
        const m = document.getElementById('selMonth').value;
        const w = document.getElementById('selWeek').value;
        if (!db[yr][name][m][w]) return alert("Select correct filters for this record!");
        
        const data = db[yr][name][m][w];
        document.getElementById('pNameSelect').value = name;
        document.getElementById('inMonth').value = m;
        document.getElementById('inWeek').value = w;
        data.sc.forEach((v, i) => document.getElementById('s' + (i + 1)).value = v);
        document.getElementById('gA').value = data.gV;
        document.getElementById('aA').value = data.aV;
        
        document.getElementById('formCard').scrollIntoView({ behavior: 'auto', block: 'start' });
        document.getElementById('btnSave').innerText = "Update Record";
        document.getElementById('btnCancel').classList.remove('hidden');
    }

    function cancelEdit() {
        document.querySelectorAll('#statsForm input').forEach(i => i.value = "");
        document.getElementById('pNameSelect').value = "";
        document.getElementById('btnSave').innerText = "Save Record";
        document.getElementById('btnCancel').classList.add('hidden');
    }

    function changeFilter(mode) {
        activeFilter = mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        if(mode === 'YEAR') {
            document.getElementById('f-YEAR').classList.add('tab-active');
            document.getElementById('selMonth').value = ""; document.getElementById('selWeek').value = "";
        }
        render();
    }
</script>
</body>
</html>
